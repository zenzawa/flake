general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = playerctl pause ; hyprlock
    ignore_dbus_inhibit = false
}

listener {
    timeout = 995
    on-timeout = brightnessctl s 5%
    on-resume = brightnessctl s 20%
}

listener {
    timeout = 1000
    on-timeout = pidof hyprlock || hyprlock
}
